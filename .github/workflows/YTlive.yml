name: Get YouTube Live m3u8

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest  # 使用最新 Ubuntu
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4  # 添加 checkout 步骤
      
    - name: Install yt-dlp
      run: |
        sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
        sudo chmod a+rx /usr/local/bin/yt-dlp
        yt-dlp --version  # 验证安装
        
    - name: Get fhzx.m3u8
      run: |
        mkdir -p ./output
        # 获取直播流地址
        STREAM_URL=$(yt-dlp -g "https://www.youtube.com/@phoenixtvglobal/live" 2>/dev/null || echo "")
        
        
        # 创建 m3u8 文件
        cat >./output/fhzx.m3u8 <<EOL
        #EXTM3U
        #EXT-X-VERSION:3
        #EXT-X-STREAM-INF:PROGRAM-ID=1,BANDWIDTH=5400000
        ${STREAM_URL}
        EOL
        
        # 显示生成的文件内容（调试用，可选）
        cat ./output/fhzx.m3u8
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4  # 更新到 v4
      with:
        name: YTlive-m3u8
        path: ./output/
        
    - name: Git push assets to "YTlive" branch
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 创建并切换到 YTlive 分支
        git checkout -b YTlive || git checkout YTlive
        
        # 复制文件到根目录（如果需要）
        cp ./output/fhzx.m3u8 ./fhzx.m3u8 2>/dev/null || true
        
        git add -A
        git commit -m "Update YTlive - $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
        git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" 2>/dev/null || true
        git push -f origin YTlive
